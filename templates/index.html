<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>せどりリサーチツール</title>
  <style>
    /* ===== リセット & 変数 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0e1a;
      --bg-card:   #0f1525;
      --bg-input:  #141926;
      --border:    #1e2d4a;
      --accent:    #00d4aa;
      --accent2:   #00a8ff;
      --text:      #e0e6f0;
      --muted:     #6b7c9e;
      --green:     #00d4aa;
      --yellow:    #f5c542;
      --orange:    #ff9f43;
      --red:       #ff4d6d;
      --radius:    12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    header {
      background: linear-gradient(135deg, #060d1f 0%, #0d1f3c 40%, #0a1a2e 70%, #050e1b 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 20% 50%, rgba(0,212,170,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 80% 50%, rgba(0,168,255,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.3);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .header-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    header h1 {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ===== メインコンテンツ ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ===== 検索カード ===== */
    .search-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 28px;
    }

    .search-card h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .search-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    #keyword-input {
      flex: 1;
      min-width: 200px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    #keyword-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.12);
    }

    #keyword-input::placeholder { color: var(--muted); }

    #search-btn {
      background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
      color: #050e1b;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #search-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    #search-btn:active:not(:disabled) { transform: translateY(0); }
    #search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ===== ローディング ===== */
    #loading {
      display: none;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 28px;
      text-align: center;
      margin-bottom: 28px;
    }

    #loading.visible { display: block; }

    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 20px;
    }

    .loading-text {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .loading-sub {
      font-size: 13px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 2.5s linear infinite;
    }

    /* ===== エラー ===== */
    #error-box {
      display: none;
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.3);
      border-radius: var(--radius);
      padding: 16px 20px;
      color: var(--red);
      margin-bottom: 28px;
      font-size: 14px;
    }

    #error-box.visible { display: block; }

    /* ===== 結果エリア ===== */
    #results-area { display: none; }
    #results-area.visible { display: block; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .results-title {
      font-size: 18px;
      font-weight: 700;
    }

    .results-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .keyword-tag {
      display: inline-block;
      background: rgba(0,212,170,0.12);
      border: 1px solid rgba(0,212,170,0.3);
      color: var(--accent);
      border-radius: 999px;
      padding: 2px 12px;
      font-size: 13px;
      margin-left: 8px;
    }

    /* ===== サマリーバー ===== */
    .summary-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .summary-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
    }

    .chip-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .dot-green  { background: var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-orange { background: var(--orange); }
    .dot-red    { background: var(--red); }

    /* ===== テーブル ===== */
    .table-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 720px;
    }

    thead th {
      background: #0c1320;
      padding: 12px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    thead th.num { text-align: right; }

    tbody tr {
      border-bottom: 1px solid rgba(30,45,74,0.6);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,212,170,0.04); }

    tbody td {
      padding: 12px 14px;
      vertical-align: middle;
    }

    tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .site-badge {
      display: inline-block;
      background: rgba(0,168,255,0.1);
      border: 1px solid rgba(0,168,255,0.25);
      color: var(--accent2);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      white-space: nowrap;
    }

    .item-name {
      color: var(--text);
      max-width: 260px;
    }

    .mock-tag {
      display: inline-block;
      background: rgba(107,124,158,0.15);
      border: 1px solid rgba(107,124,158,0.3);
      color: var(--muted);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .grade {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
    }

    .grade-S  { background: rgba(0,212,170,0.15);  color: var(--green);  border: 1px solid rgba(0,212,170,0.35); }
    .grade-A  { background: rgba(245,197,66,0.12);  color: var(--yellow); border: 1px solid rgba(245,197,66,0.3); }
    .grade-B  { background: rgba(255,159,67,0.12);  color: var(--orange); border: 1px solid rgba(255,159,67,0.3); }
    .grade-C  { background: rgba(255,77,109,0.12); color: var(--red);    border: 1px solid rgba(255,77,109,0.3); }

    .profit-pos { color: var(--green);  font-weight: 600; }
    .profit-neg { color: var(--red);    font-weight: 600; }

    .bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bar-bg {
      width: 80px; height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .bar-green  { background: linear-gradient(90deg, var(--accent), #00b894); }
    .bar-yellow { background: linear-gradient(90deg, var(--yellow), #e0ae30); }
    .bar-orange { background: linear-gradient(90deg, var(--orange), #e08030); }
    .bar-red    { background: linear-gradient(90deg, var(--red), #c0304d); }

    /* ===== アニメーション ===== */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    @keyframes shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    tbody tr { animation: fadeInUp 0.3s ease both; }

    /* ===== フッター ===== */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }

    /* ===== レスポンシブ ===== */
    @media (max-width: 600px) {
      .search-row { flex-direction: column; }
      #search-btn { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-badge">AI-Powered Research</div>
  <h1>せどりリサーチツール</h1>
  <p>Claude A（仕入れリサーチ）× Claude B（利益分析）連携システム</p>
</header>

<main>

  <!-- 検索カード -->
  <div class="search-card">
    <h2>キーワード検索</h2>
    <div class="search-row">
      <input
        id="keyword-input"
        type="text"
        placeholder="例: Nintendo Switch、ゲームボーイ、SONY ヘッドフォン..."
        autocomplete="off"
      />
      <button id="search-btn">リサーチ開始</button>
    </div>
  </div>

  <!-- ローディング -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">各仕入れサイトをスキャン中...</div>
    <div class="loading-sub" id="loading-sub">Claude A・Claude B が連携してリサーチ中...</div>
  </div>

  <!-- エラー -->
  <div id="error-box"></div>

  <!-- 結果エリア -->
  <div id="results-area">

    <div class="results-header">
      <div class="results-title">
        リサーチ結果
        <span class="keyword-tag" id="result-keyword"></span>
      </div>
      <div class="results-meta" id="result-count"></div>
    </div>

    <!-- サマリーバー -->
    <div class="summary-bar" id="summary-bar"></div>

    <!-- テーブル -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>評価</th>
            <th>仕入れサイト</th>
            <th>商品名</th>
            <th class="num">仕入れ値</th>
            <th class="num">Amazon価格</th>
            <th class="num">手数料</th>
            <th class="num">利益</th>
            <th class="num">利益率</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>

  </div><!-- /results-area -->

</main>

<footer>
  &copy; 2026 せどりリサーチツール &nbsp;|&nbsp;
  Claude A（仕入れリサーチ）× Claude B（利益分析）&nbsp;|&nbsp;
  手数料: Amazon販売手数料15% + FBA配送料¥300
</footer>

<script>
  const keywordInput = document.getElementById('keyword-input');
  const searchBtn    = document.getElementById('search-btn');
  const loading      = document.getElementById('loading');
  const loadingSub   = document.getElementById('loading-sub');
  const errorBox     = document.getElementById('error-box');
  const resultsArea  = document.getElementById('results-area');
  const resultKeyword= document.getElementById('result-keyword');
  const resultCount  = document.getElementById('result-count');
  const summaryBar   = document.getElementById('summary-bar');
  const resultsBody  = document.getElementById('results-body');

  // ローディングメッセージのローテーション
  const loadingMessages = [
    'Claude A・Claude B が連携してリサーチ中...',
    'Claude A: メルカリ・ヤフオク・Yahoo!フリマをスキャン中...',
    'Claude A: オフモール・セカンドストリート・トレファクを調査中...',
    'Claude B: Amazon価格を取得中...',
    'Claude B: 利益率を計算・ランキング中...',
    'リサーチ結果を集計しています...',
  ];
  let loadingIdx = 0;
  let loadingTimer = null;

  function startLoadingAnim() {
    loadingIdx = 0;
    loadingSub.textContent = loadingMessages[0];
    loadingTimer = setInterval(() => {
      loadingIdx = (loadingIdx + 1) % loadingMessages.length;
      loadingSub.textContent = loadingMessages[loadingIdx];
    }, 2200);
  }

  function stopLoadingAnim() {
    clearInterval(loadingTimer);
  }

  function setLoading(on) {
    if (on) {
      loading.classList.add('visible');
      errorBox.classList.remove('visible');
      resultsArea.classList.remove('visible');
      searchBtn.disabled = true;
      keywordInput.disabled = true;
      startLoadingAnim();
    } else {
      loading.classList.remove('visible');
      searchBtn.disabled = false;
      keywordInput.disabled = false;
      stopLoadingAnim();
    }
  }

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.classList.add('visible');
  }

  // グレード → クラス・ラベル変換
  function gradeInfo(grade) {
    switch(grade) {
      case '◎': return { cls: 'grade-S', label: '◎', barCls: 'bar-green',  dotCls: 'dot-green' };
      case '○': return { cls: 'grade-A', label: '○', barCls: 'bar-yellow', dotCls: 'dot-yellow' };
      case '△': return { cls: 'grade-B', label: '△', barCls: 'bar-orange', dotCls: 'dot-orange' };
      default:   return { cls: 'grade-C', label: '✗', barCls: 'bar-red',    dotCls: 'dot-red' };
    }
  }

  function fmt(n) {
    return Number(n).toLocaleString('ja-JP');
  }

  function renderResults(keyword, results) {
    resultKeyword.textContent = keyword;
    resultCount.textContent   = `${results.length} 件`;

    // サマリー集計
    const counts = { '◎': 0, '○': 0, '△': 0, '✗': 0 };
    results.forEach(r => { counts[r.grade] = (counts[r.grade] || 0) + 1; });

    const chipDefs = [
      { grade: '◎', label: '◎ 優良',  dotCls: 'dot-green' },
      { grade: '○', label: '○ 良好',  dotCls: 'dot-yellow' },
      { grade: '△', label: '△ トントン', dotCls: 'dot-orange' },
      { grade: '✗', label: '✗ 赤字',  dotCls: 'dot-red' },
    ];
    summaryBar.innerHTML = chipDefs.map(c => `
      <div class="summary-chip">
        <span class="chip-dot ${c.dotCls}"></span>
        ${c.label}: ${counts[c.grade] || 0}件
      </div>
    `).join('');

    // テーブル行
    const maxRate = Math.max(...results.map(r => Math.abs(r.profit_rate)), 1);

    resultsBody.innerHTML = results.map((r, i) => {
      const gi = gradeInfo(r.grade);
      const profitCls = r.profit >= 0 ? 'profit-pos' : 'profit-neg';
      const profitSign = r.profit >= 0 ? '+' : '';
      const barW = Math.min(Math.abs(r.profit_rate) / maxRate * 100, 100).toFixed(1);
      const mockTag = r.is_mock ? '<span class="mock-tag">モック</span>' : '';
      const delay = (i * 40) + 'ms';

      return `
        <tr style="animation-delay:${delay}">
          <td><span class="grade ${gi.cls}">${gi.label}</span></td>
          <td><span class="site-badge">${r.site}</span></td>
          <td class="item-name">${escHtml(r.name)}${mockTag}</td>
          <td class="num">¥${fmt(r.buy_price)}</td>
          <td class="num">¥${fmt(r.amazon_price)}</td>
          <td class="num">¥${fmt(r.fee)}</td>
          <td class="num ${profitCls}">${profitSign}¥${fmt(r.profit)}</td>
          <td class="num">
            <div class="bar-wrap">
              <div class="bar-bg">
                <div class="bar-fill ${gi.barCls}" style="width:${barW}%"></div>
              </div>
              <span class="${profitCls}">${r.profit_rate.toFixed(1)}%</span>
            </div>
          </td>
        </tr>
      `;
    }).join('');

    resultsArea.classList.add('visible');
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function doSearch() {
    const keyword = keywordInput.value.trim();
    if (!keyword) {
      keywordInput.focus();
      return;
    }

    setLoading(true);

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ keyword }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'APIエラーが発生しました');
        return;
      }

      if (!data.results || data.results.length === 0) {
        showError('検索結果が0件でした。キーワードを変えて再試行してください。');
        return;
      }

      renderResults(data.keyword, data.results);

    } catch (err) {
      showError('通信エラーが発生しました: ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  searchBtn.addEventListener('click', doSearch);
  keywordInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>

</body>
</html>
